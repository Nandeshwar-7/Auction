services:
  postgres:
    image: postgres:16
    container_name: auction-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: auction
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auction"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - auction-postgres-data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: auction-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auction?schema=public
      AUCTION_WS_PORT: 4000
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      NEXT_ALLOWED_DEV_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      SESSION_COOKIE_SECURE: "false"
    command: sh -c "npm run db:migrate:deploy && npm run start:server"
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: auction-web
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_AUCTION_API_PORT: 4000
      NEXT_PUBLIC_AUCTION_WS_PORT: 4000
    ports:
      - "3000:3000"

volumes:
  auction-postgres-data:
